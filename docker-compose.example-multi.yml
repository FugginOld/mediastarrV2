# Beispiel: Mehrere Instanzen mit eigenem Docker-Netzwerk
services:
  mediastarrv2:
    image: fugginold/mediastarrv2:latest
    container_name: mediastarrv2
    restart: unless-stopped
    ports:
      - "7979:7979"
    volumes:
      - /mnt/user/appdata/mediastarrv2:/data
    # environment:
    #   - MEDIASTARR_PASSWORD=change-me
    networks:
      - arr

networks:
  arr:
    external: true   # Name des bestehenden Netzwerks deines Arr-Stacks



