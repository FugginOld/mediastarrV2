# Example: Multiple instances with a dedicated Docker network
services:
  mediahunter:
    image: fugginold/mediahunter:latest
    container_name: mediahunter
    restart: unless-stopped
    ports:
      - "7979:7979"
    volumes:
      - /mnt/user/appdata/mediahunter:/data
    # environment:
    #   - MEDIAHUNTER_PASSWORD=change-me
    networks:
      - arr

networks:
  arr:
    external: true   # Name of the existing network for your Arr stack



