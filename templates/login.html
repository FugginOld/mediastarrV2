<!DOCTYPE html>
<html lang="en" data-theme="{{ theme|default('system') }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaHunter Login</title>
  <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='icon.png') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icon.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='theme-system.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='auth-common.css') }}">
  <style>
    body {
      display: grid;
      place-items: center;
      padding: 24px;
      background: radial-gradient(circle at top, rgba(var(--accent-rgb),0.12), transparent 35%), var(--bg);
    }
    .wrap { width: min(100%, 440px); }
    .theme-switch { margin-bottom: 14px; }
    .card { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; box-shadow: 0 28px 80px rgba(0, 0, 0, 0.45); overflow: hidden; }
    .accent { height: 3px; background: linear-gradient(90deg, var(--accent), var(--accent-g)); }
    .body { padding: 28px; }
    .login-logo { width: 104px; height: 104px; margin: 0 auto 18px; border-radius: 22px; }
    h1 { margin: 0 0 8px; font-family: 'Bricolage Grotesque', sans-serif; font-size: 30px; line-height: 1; text-align: center; }
    p { margin: 0 0 20px; color: var(--muted); font-size: 12px; line-height: 1.6; text-align: center; }
    label { display: block; margin-bottom: 6px; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
    input { width: 100%; padding: 11px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font: inherit; outline: none; }
    input:focus { border-color: var(--accent); }
    .submit { width: 100%; margin-top: 16px; padding: 11px 14px; border: 0; border-radius: 8px; background: var(--accent); color: #fff; font: inherit; cursor: pointer; }
    .error { margin-bottom: 14px; padding: 10px 12px; border-radius: 8px; background: rgba(var(--red-rgb), 0.1); border: 1px solid rgba(var(--red-rgb), 0.25); color: var(--red); font-size: 11px; }
  </style>
</head>
<body class="auth-ui">
  <div class="wrap">
    <div class="theme-switch">
      <button class="theme-btn theme-system active" id="theme-system" type="button" onclick="setTheme('system')"><div class="theme-btn-head"><div class="theme-btn-copy"><strong>System</strong><span>Follows OS light/dark</span></div><div class="theme-swatches" aria-hidden="true"><span class="theme-swatch bg"></span><span class="theme-swatch surface"></span><span class="theme-swatch accent"></span><span class="theme-swatch support"></span></div></div></button>
      <button class="theme-btn theme-github-inspired" id="theme-github-inspired" type="button" onclick="setTheme('github-inspired')"><div class="theme-btn-head"><div class="theme-btn-copy"><strong>GitHub Inspired</strong><span>Neutral dev palette</span></div><div class="theme-swatches" aria-hidden="true"><span class="theme-swatch bg"></span><span class="theme-swatch surface"></span><span class="theme-swatch accent"></span><span class="theme-swatch support"></span></div></div></button>
      <button class="theme-btn theme-discord-inspired" id="theme-discord-inspired" type="button" onclick="setTheme('discord-inspired')"><div class="theme-btn-head"><div class="theme-btn-copy"><strong>Discord Inspired</strong><span>Violet social palette</span></div><div class="theme-swatches" aria-hidden="true"><span class="theme-swatch bg"></span><span class="theme-swatch surface"></span><span class="theme-swatch accent"></span><span class="theme-swatch support"></span></div></div></button>
      <button class="theme-btn theme-plex-inspired" id="theme-plex-inspired" type="button" onclick="setTheme('plex-inspired')"><div class="theme-btn-head"><div class="theme-btn-copy"><strong>Plex Inspired</strong><span>Warm cinema palette</span></div><div class="theme-swatches" aria-hidden="true"><span class="theme-swatch bg"></span><span class="theme-swatch surface"></span><span class="theme-swatch accent"></span><span class="theme-swatch support"></span></div></div></button>
    </div>
    <form class="card" method="post" action="/login">
      <div class="accent"></div>
      <div class="body">
        <div class="login-logo mh-logo-frame"><img src="{{ url_for('static', filename='logo.png') }}" alt="MediaHunter logo"></div>
        <h1>Media<span style="color: var(--accent)">Hunter</span></h1>
        <p>Dashboard access is protected. Enter the password configured with `MEDIAHUNTER_PASSWORD`.</p>
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="next" value="{{ next_path }}">
        <input type="hidden" name="theme" id="theme-input" value="{{ theme|default('system') }}">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button class="submit" type="submit">Sign in</button>
      </div>
    </form>
  </div>
  <script>
    let currentTheme = '{{ theme|default("system") }}';
    function normalizeTheme(theme) {
      const aliases = { dark: 'system', light: 'system', oled: 'system', 'system-dark': 'system', 'system-light': 'system' };
      return aliases[String(theme || '').trim().toLowerCase()] || String(theme || '').trim().toLowerCase() || 'system';
    }
    function setTheme(theme, persist = true) {
      currentTheme = normalizeTheme(theme);
      document.documentElement.setAttribute('data-theme', currentTheme);
      document.getElementById('theme-input').value = currentTheme;
      document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.id === `theme-${currentTheme}`));
      if (persist) localStorage.setItem('mediahunter-theme', currentTheme);
    }
    (function initTheme() {
      const stored = localStorage.getItem('mediahunter-theme');
      setTheme(stored || currentTheme, false);
    })();
  </script>
</body>
</html>
